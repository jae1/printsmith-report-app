<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>PrintSmith Daily Report</title>
<style>
  body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
  h1 { color: #333; }
  .controls { margin-bottom: 20px; display: flex; gap: 10px; align-items: center; }
  input[type=date] { padding: 8px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; }
  button { padding: 8px 16px; font-size: 14px; border: none; border-radius: 4px; cursor: pointer; }
  .btn-load { background: #4472C4; color: white; }
  .btn-export { background: #70AD47; color: white; }
  .btn-email { background: #5BC0DE; color: white; }
  .btn-hide { background: #eee; color: #999; padding: 2px 6px; font-size: 11px; margin-left: 5px; border-radius: 3px; cursor: pointer; border: none; }
  .btn-hide:hover { background: #ddd; color: #333; }
  .section { background: white; border-radius: 8px; padding: 16px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  .section h2 { margin-top: 0; font-size: 16px; }
  .new_today h2 { color: #4472C4; }
  .in_progress h2 { color: #7030A0; }
  .ready h2 { color: #70AD47; }
  .picked_up h2 { color: #ED7D31; }
  .paid h2 { color: #B8860B; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: #eee; padding: 8px; text-align: left; }
  th { background: #eee; padding: 8px; text-align: left; cursor: pointer; user-select: none; }
  th:hover { background: #ddd; }
  .sort-icon { font-size: 10px; margin-left: 4px; color: #999; }
  td { padding: 8px; border-bottom: 1px solid #eee; }
  .empty { color: #999; font-style: italic; }
  .count { font-size: 12px; color: #666; margin-left: 8px; }
</style>
</head>
<body>
<h1>📋 PrintSmith Daily Report</h1>
<div class="controls">
  <input type="date" id="dateInput">
  <button class="btn-load" onclick="loadReport()">불러오기</button>
  <button class="btn-export" onclick="exportExcel()">엑셀 다운로드</button>
  <button class="btn-email" onclick="sendEmail()">사장님께 이메일</button>
  <span id="updateStatus" style="font-size: 12px; color: #666; margin-left: 10px;"></span>
</div>
<div id="report"></div>
<div id="hiddenSection" class="section" style="margin-top: 50px; border-top: 2px solid #eee;">
  <h2>🙈 숨김 목록 관리</h2>
  <div id="hiddenList" style="display: flex; gap: 10px; flex-wrap: wrap;"></div>
</div>
<script>
  let reportData = null;
  let sortConfig = { key: 'invoicenumber', direction: 'desc', section: null };
  let autoRefreshTimer = null;

  const today = new Date().toISOString().split('T')[0];
  document.getElementById('dateInput').value = today;

  async function loadReport(isAuto = false) {
    const d = document.getElementById('dateInput').value;
    if (!isAuto) {
        document.getElementById('report').innerHTML = '<p>로딩 중...</p>';
    }
    
    try {
      const res = await fetch('/api/report?target_date=' + d);
      reportData = await res.json();
      renderReport();
      loadHiddenList(); // 숨김 목록도 함께 로드
      
      const now = new Date().toLocaleTimeString();
      document.getElementById('updateStatus').innerText = `마지막 업데이트: ${now} (60초마다 자동 갱신)`;
    } catch(e) {
      if (!isAuto) {
        document.getElementById('report').innerHTML = '<p style="color:red">에러: ' + e.message + '</p>';
      }
      console.error('Auto-refresh error:', e);
    }
    
    // Reset timer
    if (autoRefreshTimer) clearInterval(autoRefreshTimer);
    autoRefreshTimer = setInterval(() => loadReport(true), 60000); // 1 min
  }

  async function hideInvoice(invNum) {
    if (!confirm(`인보이스 #${invNum}을 리포트에서 영구히 숨기시겠습니까?`)) return;
    try {
      await fetch(`/api/hide/${invNum}`, { method: 'POST' });
      loadReport();
    } catch(e) { alert('실패: ' + e.message); }
  }

  async function loadHiddenList() {
    try {
      const res = await fetch('/api/hidden');
      const list = await res.json();
      let html = '';
      if (list.length === 0) html = '<p class="empty">숨긴 내역 없음</p>';
      for (const inv of list) {
        html += `<span style="background:#f0f0f0; padding:4px 8px; border-radius:4px; font-size:12px; border:1px solid #ccc;">
          #${inv} <button onclick="unhideInvoice('${inv}')" style="padding:0; background:none; border:none; color:red; cursor:pointer; font-weight:bold; margin-left:5px;">[해제]</button>
        </span>`;
      }
      document.getElementById('hiddenList').innerHTML = html;
    } catch(e) { console.error(e); }
  }

  async function unhideInvoice(invNum) {
    try {
      await fetch(`/api/unhide/${invNum}`, { method: 'POST' });
      loadReport();
    } catch(e) { alert('실패: ' + e.message); }
  }

  function fmt(val) {
    if (!val) return '-';
    return String(val).split('T')[0];
  }

  function handleSort(sectionKey, columnKey) {
    if (sortConfig.section === sectionKey && sortConfig.key === columnKey) {
      sortConfig.direction = sortConfig.direction === 'asc' ? 'desc' : 'asc';
    } else {
      sortConfig.section = sectionKey;
      sortConfig.key = columnKey;
      sortConfig.direction = 'desc'; // Default to desc when changing column
    }

    reportData[sectionKey].sort((a, b) => {
      let v1 = a[columnKey];
      let v2 = b[columnKey];
      
      // Handle numeric values (like invoicenumber and grandtotal)
      if (columnKey === 'invoicenumber' || columnKey === 'grandtotal') {
        v1 = parseFloat(v1 || 0);
        v2 = parseFloat(v2 || 0);
      } else {
        v1 = String(v1 || '').toLowerCase();
        v2 = String(v2 || '').toLowerCase();
      }

      if (v1 < v2) return sortConfig.direction === 'asc' ? -1 : 1;
      if (v1 > v2) return sortConfig.direction === 'asc' ? 1 : -1;
      return 0;
    });

    renderReport();
  }

  function getSortIcon(sectionKey, columnKey) {
    if (sortConfig.section === sectionKey && sortConfig.key === columnKey) {
      return sortConfig.direction === 'asc' ? ' ▲' : ' ▼';
    }
    return '';
  }

  function fmtAmt(val) {
    const amt = parseFloat(val || 0);
    return '$' + amt.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function renderReport() {
    if (!reportData) return;
    const data = reportData;
    const sections = [
      { key: 'new_today', title: '오늘 들어온 잡', cls: 'new_today', dateCol: 'wanteddate', dateLabel: '납기일' },
      { key: 'in_progress', title: '진행중인 잡', cls: 'in_progress', dateCol: 'wanteddate', dateLabel: '납기일', showStatus: true },
      { key: 'ready', title: '준비된 잡', cls: 'ready', dateCol: 'wanteddate', dateLabel: '납기일' },
      { key: 'picked_up', title: '오늘 픽업/배달 완료', cls: 'picked_up', dateCol: 'pickupdate', dateLabel: '픽업일' },
      { key: 'paid', title: '오늘 결제한 잡', cls: 'paid', dateCol: 'ordereddate', dateLabel: '주문일' },
    ];

    let html = '';
    for (const s of sections) {
      const items = data[s.key];
      html += `<div class="section ${s.cls}">`;
      html += `<h2>${s.title} <span class="count">(${items.length}건)</span></h2>`;
      if (items.length === 0) {
        html += '<p class="empty">없음</p>';
      } else {
        html += `<table>
          <tr>
            <th onclick="handleSort('${s.key}', 'invoicenumber')">Invoice #${getSortIcon(s.key, 'invoicenumber')}</th>
            <th onclick="handleSort('${s.key}', 'account_display')">Account${getSortIcon(s.key, 'account_display')}</th>
            <th onclick="handleSort('${s.key}', 'contact_display')">Contact${getSortIcon(s.key, 'contact_display')}</th>
            <th onclick="handleSort('${s.key}', 'job_name')">작업 내용${getSortIcon(s.key, 'job_name')}</th>
            ${s.showStatus ? `<th onclick="handleSort('${s.key}', 'status')">Status${getSortIcon(s.key, 'status')}</th>` : ''}
            <th onclick="handleSort('${s.key}', 'ordereddate')">주문일${getSortIcon(s.key, 'ordereddate')}</th>
            <th onclick="handleSort('${s.key}', '${s.dateCol}')">${s.dateLabel}${getSortIcon(s.key, s.dateCol)}</th>
            <th onclick="handleSort('${s.key}', 'grandtotal')">금액${getSortIcon(s.key, 'grandtotal')}</th>
          </tr>`;
        let sectionTotal = 0;
        for (const item of items) {
          const amt = parseFloat(item.grandtotal || 0);
          sectionTotal += amt;
          
          html += `<tr>
            <td>
              ${item.invoicenumber||''}
              <button class="btn-hide" onclick="hideInvoice('${item.invoicenumber}')" title="리포트에서 숨기기">숨김</button>
            </td>
            <td>${item.account_display||'-'}</td>
            <td>${item.contact_display||''}</td>
            <td>${item.job_name||''}</td>
            ${s.showStatus ? `<td>${item.status||'-'}</td>` : ''}
            <td>${fmt(item.ordereddate)}</td>
            <td>${fmt(item[s.dateCol])}</td>
            <td>${fmtAmt(item.grandtotal)}</td>
          </tr>`;
        }
        html += `<tr style="font-weight:bold; background:#f9f9f9;">
          <td colspan="${s.showStatus ? 7 : 6}" style="text-align:right; padding:8px;">Total</td>
          <td style="padding:8px;">${fmtAmt(sectionTotal)}</td>
        </tr>`;
        html += '</table>';
      }
      html += '</div>';
    }
    document.getElementById('report').innerHTML = html;
  }

  function exportExcel() {
    const d = document.getElementById('dateInput').value;
    window.location.href = '/api/export?target_date=' + d;
  }

  async function sendEmail() {
    const d = document.getElementById('dateInput').value;
    if (!confirm('사장님께 이메일 보고서를 전송하시겠습니까?')) return;
    
    try {
      const res = await fetch('/api/report/email?target_date=' + d);
      const result = await res.json();
      if (result.status === 'success') {
        alert('이메일 전송 성공!');
      } else {
        alert('에러: ' + result.message);
      }
    } catch(e) {
      alert('전송 실패: ' + e.message);
    }
  }

  loadReport();
</script>
</body>
</html>
