<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PrintSmith Daily Report</title>
<style>
  body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
  h1 { color: #333; }
  .controls { margin-bottom: 20px; display: flex; gap: 10px; align-items: center; }
  input[type=date], input[type=text], input[type=email], input[type=number] { padding: 10px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
  button { padding: 10px 16px; font-size: 14px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
  
  .btn-load { background: #4472C4; color: white; }
  .btn-export { background: #70AD47; color: white; }
  .btn-email { background: #5BC0DE; color: white; }
  .btn-settings { background: #6c757d; color: white; margin-left: auto; }
  
  .btn-refresh-fixed { 
    position: fixed; 
    top: 20px; 
    right: 20px; 
    z-index: 1000; 
    background: #28a745; 
    color: white; 
    padding: 12px 20px;
    border-radius: 30px; 
    display: flex; 
    align-items: center; 
    gap: 8px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
    cursor: pointer;
    font-size: 16px;
    border: 2px solid white;
    transition: all 0.2s;
  }
  .btn-refresh-fixed:hover { background: #218838; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.4); }

  .section { background: white; border-radius: 8px; padding: 16px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  .section h2 { margin-top: 0; font-size: 16px; }
  
  .new_today h2 { color: #4472C4; }
  .in_progress h2 { color: #7030A0; }
  .ready h2 { color: #70AD47; }
  .picked_up h2 { color: #ED7D31; }
  .paid h2 { color: #B8860B; }
  .spending h2 { color: #d9534f; }

  .badge-paid { background: #28a745; color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; margin-left: 5px; }
  .badge-bal { background: #FFC000; color: #333; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; margin-left: 5px; }
  .badge-type { padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; margin-right: 5px; color: white; }
  .bg-paid { background: #28a745; }
  .bg-deposit { background: #007bff; }
  .bg-ar { background: #17a2b8; }
  .bg-mixed { background: #6f42c1; }
  .badge-method { background: #e9ecef; color: #495057; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; border: 1px solid #ced4da; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: #eee; padding: 8px; text-align: left; cursor: pointer; user-select: none; }
  th:hover { background: #ddd; }
  td { padding: 8px; border-bottom: 1px solid #eee; }
  
  .btn-hide { background: #eee; color: #999; padding: 2px 6px; font-size: 11px; margin-left: 5px; border-radius: 3px; border: none; cursor: pointer; }
  .empty { color: #999; font-style: italic; }
  
  /* Modal Styles */
  .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
  .modal-content { background-color: white; margin: 10% auto; padding: 30px; border-radius: 12px; width: 500px; box-shadow: 0 5px 25px rgba(0,0,0,0.2); }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .close-modal { font-size: 32px; cursor: pointer; color: #999; background: none; border: none; padding: 0; line-height: 1; margin-top: -10px; }
  .close-modal:hover { color: #d9534f; }
  
  .email-tag { background: #e7f1ff; color: #007bff; padding: 5px 10px; border-radius: 20px; font-size: 13px; display: flex; align-items: center; gap: 8px; font-weight: bold; }
  .remove-email { cursor: pointer; color: #dc3545; }
</style>
</head>
<body>

<button class="btn-refresh-fixed" onclick="loadReport(true)"><span>🔄</span> Refresh</button>

<h1>📋 PrintSmith Daily Report</h1>

<div class="controls">
  <input type="date" id="dateInput">
  <button class="btn-load" onclick="loadReport()">Load Report</button>
  <button class="btn-export" onclick="exportExcel()">Export Excel</button>
  <button class="btn-email" onclick="sendEmail()">Email to Boss</button>
  <button class="btn-settings" onclick="openSettings()">⚙️ Settings</button>
  <span id="updateStatus" style="font-size: 12px; color: #666; margin-left: 10px;"></span>
</div>

<div id="report"></div>

<div id="spendingSection" class="section spending">
  <h2>💸 Daily Spending <span id="spendingCount" class="count"></span></h2>
  <div class="spending-input-row" style="margin-bottom: 20px; background: #fff9f9; padding: 20px; border-radius: 8px; border: 1px dashed #d9534f; display: flex; gap: 15px; align-items: flex-end;">
    <div style="flex: 2;">
      <label style="display: block; font-size: 12px; color: #d9534f; margin-bottom: 5px; font-weight: bold;">Vendor</label>
      <input type="text" id="spendVendor" list="vendorList" autocomplete="off" placeholder="e.g. Amazon" style="width: 100%;">
      <datalist id="vendorList"></datalist>
    </div>
    <div style="flex: 4;">
      <label style="display: block; font-size: 12px; color: #d9534f; margin-bottom: 5px; font-weight: bold;">Description</label>
      <input type="text" id="spendDesc" placeholder="e.g. Paper supplies" style="width: 100%;">
    </div>
    <div style="flex: 1.5;">
      <label style="display: block; font-size: 12px; color: #d9534f; margin-bottom: 5px; font-weight: bold;">Amount ($)</label>
      <input type="number" id="spendAmount" placeholder="0.00" step="0.01" style="width: 100%;">
    </div>
    <button onclick="addSpending()" style="background: #d9534f; color: white; padding: 12px 20px;">Add Entry</button>
  </div>
  <div id="spendingTableContainer"></div>
</div>

<!-- Settings Modal -->
<div id="settingsModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 style="margin:0;">⚙️ Report Settings</h2>
      <button class="close-modal" onclick="closeSettings()">&times;</button>
    </div>
    
    <div style="margin-bottom: 25px;">
      <label style="display: block; font-size: 14px; font-weight: bold; margin-bottom: 10px;">Email Recipients</label>
      <div id="emailTags" style="display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px;"></div>
      <div style="display: flex; gap: 10px;">
        <input type="email" id="newEmailInput" placeholder="Add email..." style="flex: 1;">
        <button onclick="addEmailTag()" style="background: #007bff; color: white;">Add</button>
      </div>
    </div>

    <div style="margin-bottom: 25px;">
      <label style="display: block; font-size: 14px; font-weight: bold; margin-bottom: 10px;">Report Subject Prefix</label>
      <input type="text" id="setReportPrefix" style="width: 100%;">
      <p style="font-size: 11px; color: #888; margin-top: 5px;">Format: [Prefix] {{date}} Daily Report</p>
    </div>

    <div style="margin-bottom: 25px; padding: 15px; background: #f8f9fa; border-radius: 8px; border: 1px solid #ddd;">
      <label style="display: flex; align-items: center; font-size: 14px; font-weight: bold; margin-bottom: 15px; cursor: pointer;">
        <input type="checkbox" id="setAutoEnable" style="width: auto; margin-right: 10px; transform: scale(1.2);">
        Enable Automated Daily Email
      </label>
      
      <div id="autoSettingsOptions" style="opacity: 0.5; pointer-events: none; transition: opacity 0.3s;">
        <div style="margin-bottom: 15px;">
            <label style="display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px;">Time to Send</label>
            <input type="time" id="setAutoTime" style="padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
        </div>
        <div>
            <label style="display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px;">Days to Send</label>
            <div style="display: flex; flex-wrap: wrap; gap: 10px; font-size: 13px;">
                <label><input type="checkbox" class="day-chk" value="0"> Mon</label>
                <label><input type="checkbox" class="day-chk" value="1"> Tue</label>
                <label><input type="checkbox" class="day-chk" value="2"> Wed</label>
                <label><input type="checkbox" class="day-chk" value="3"> Thu</label>
                <label><input type="checkbox" class="day-chk" value="4"> Fri</label>
                <label><input type="checkbox" class="day-chk" value="5"> Sat</label>
                <label><input type="checkbox" class="day-chk" value="6"> Sun</label>
            </div>
        </div>
      </div>
    </div>

    <div id="hiddenListSection" style="margin-bottom: 25px; padding-top: 20px; border-top: 1px solid #eee;">
      <label style="display: block; font-size: 14px; font-weight: bold; margin-bottom: 10px;">🙈 Hidden Invoices</label>
      <div id="hiddenList" style="display: flex; gap: 8px; flex-wrap: wrap;"></div>
    </div>

    <div style="text-align: right; margin-top: 30px;">
      <button onclick="closeSettings()" style="background: #6c757d; color: white; padding: 12px 20px; margin-right: 10px;">Cancel</button>
      <button onclick="saveSettings()" style="background: #28a745; color: white; padding: 12px 30px;">Save</button>
    </div>
  </div>
</div>

<script>
  let reportData = null;
  let sortConfig = { key: 'invoicenumber', direction: 'desc', section: null };
  let autoRefreshTimer = null;
  let currentSettings = { boss_emails: [] };

  const today = new Date().toISOString().split('T')[0];
  const dateInput = document.getElementById('dateInput');
  dateInput.value = today;
  dateInput.max = today;

  async function loadReport(isAuto = false) {
    const d = dateInput.value;
    if (!isAuto) document.getElementById('report').innerHTML = '<p>Loading...</p>';
    
    try {
      const res = await fetch('/api/report?target_date=' + d);
      reportData = await res.json();
      renderReport();
      loadSpending();
      loadVendors();
      loadSettings(); 
      
      const now = new Date().toLocaleTimeString();
      document.getElementById('updateStatus').innerText = `Last Updated: ${now} (Auto-refresh 60s)`;
    } catch(e) {
      if (!isAuto) document.getElementById('report').innerHTML = '<p style="color:red">Error: ' + e.message + '</p>';
    }
    
    if (autoRefreshTimer) clearInterval(autoRefreshTimer);
    autoRefreshTimer = setInterval(() => loadReport(true), 60000);
  }

  /* Settings Logic */
  function openSettings() { document.getElementById('settingsModal').style.display = 'block'; loadHiddenList(); }
  function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }

  document.getElementById('setAutoEnable').addEventListener('change', function(e) {
      const opts = document.getElementById('autoSettingsOptions');
      opts.style.opacity = e.target.checked ? '1' : '0.5';
      opts.style.pointerEvents = e.target.checked ? 'auto' : 'none';
  });

  async function loadSettings() {
    try {
      const res = await fetch('/api/settings');
      currentSettings = await res.json();
      document.getElementById('setReportPrefix').value = currentSettings.report_title_prefix;
      
      const autoEnable = document.getElementById('setAutoEnable');
      autoEnable.checked = currentSettings.auto_send_enabled;
      document.getElementById('setAutoTime').value = currentSettings.auto_send_time;
      
      // Trigger visual update for options
      autoEnable.dispatchEvent(new Event('change'));

      const days = currentSettings.auto_send_days || [];
      document.querySelectorAll('.day-chk').forEach(chk => {
          chk.checked = days.includes(parseInt(chk.value));
      });

      renderEmailTags();
    } catch(e) { console.error(e); }
  }

  function renderEmailTags() {
    const container = document.getElementById('emailTags');
    container.innerHTML = currentSettings.boss_emails.map((email, index) => `
      <div class="email-tag">${email} <span class="remove-email" onclick="removeEmail(${index})">&times;</span></div>
    `).join('') || '<p class="empty" style="margin:0;">No recipients added.</p>';
  }

  function addEmailTag() {
    const input = document.getElementById('newEmailInput');
    const email = input.value.trim();
    if (email && !currentSettings.boss_emails.includes(email)) {
      currentSettings.boss_emails.push(email);
      input.value = '';
      renderEmailTags();
    }
  }

  function removeEmail(index) {
    currentSettings.boss_emails.splice(index, 1);
    renderEmailTags();
  }

  async function saveSettings() {
    currentSettings.report_title_prefix = document.getElementById('setReportPrefix').value;
    currentSettings.auto_send_enabled = document.getElementById('setAutoEnable').checked;
    currentSettings.auto_send_time = document.getElementById('setAutoTime').value || "17:00";
    
    const selectedDays = [];
    document.querySelectorAll('.day-chk:checked').forEach(chk => {
        selectedDays.push(parseInt(chk.value));
    });
    currentSettings.auto_send_days = selectedDays;

    try {
      await fetch('/api/settings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(currentSettings)
      });
      closeSettings();
    } catch(e) { alert('Failed to save settings'); }
  }

  /* Hiding Logic */
  async function hideInvoice(invNum) {
    if (!confirm(`Hide Invoice #${invNum} permanently?`)) return;
    try { await fetch(`/api/hide/${invNum}`, { method: 'POST' }); loadReport(); } catch(e) { alert(e.message); }
  }

  async function loadHiddenList() {
    try {
      const res = await fetch('/api/hidden');
      const list = await res.json();
      document.getElementById('hiddenList').innerHTML = list.map(inv => `
        <span style="background:#f0f0f0; padding:4px 8px; border-radius:4px; font-size:12px; border:1px solid #ccc;">
          #${inv} <button onclick="unhideInvoice('${inv}')" style="background:none; border:none; color:red; cursor:pointer; font-weight:bold;">[Unhide]</button>
        </span>
      `).join('') || '<p class="empty">No hidden items</p>';
    } catch(e) { console.error(e); }
  }

  async function unhideInvoice(invNum) {
    try { await fetch(`/api/unhide/${invNum}`, { method: 'POST' }); loadReport(); loadHiddenList(); } catch(e) { alert(e.message); }
  }

  /* Spending Logic */
  async function loadSpending() {
    try {
      const res = await fetch(`/api/spending?target_date=${dateInput.value}`);
      renderSpending(await res.json());
    } catch(e) { console.error(e); }
  }

  async function addSpending() {
    const vendor = document.getElementById('spendVendor').value;
    const description = document.getElementById('spendDesc').value;
    const amount = document.getElementById('spendAmount').value;
    if (!vendor || !amount) { alert('Enter vendor and amount'); return; }
    try {
      await fetch(`/api/spending?target_date=${dateInput.value}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ vendor, description, amount: parseFloat(amount) })
      });
      document.getElementById('spendVendor').value = '';
      document.getElementById('spendDesc').value = '';
      document.getElementById('spendAmount').value = '';
      loadSpending();
      loadVendors();
    } catch(e) { alert('Failed'); }
  }

  async function loadVendors() {
    try {
      const res = await fetch('/api/vendors');
      const vendors = await res.json();
      const dl = document.getElementById('vendorList');
      dl.innerHTML = vendors.map(v => `<option value="${v}"></option>`).join('');
    } catch(e) { console.error('Failed to load vendors', e); }
  }

  async function deleteSpending(id) {
    if (!confirm('Delete entry?')) return;
    try { await fetch(`/api/spending/${dateInput.value}/${id}`, { method: 'DELETE' }); loadSpending(); } catch(e) { alert('Failed'); }
  }

  function renderSpending(list) {
    document.getElementById('spendingCount').innerText = `(${list.length} items)`;
    let html = '';
    if (list.length === 0) {
      html = '<p class="empty">No spending recorded for this date.</p>';
    } else {
      html = '<table><tr><th>Vendor</th><th>Description</th><th>Amount</th><th></th></tr>';
      let total = 0;
      for (const s of list) {
        total += s.amount;
        html += `<tr><td>${s.vendor}</td><td>${s.description}</td><td>${fmtAmt(s.amount)}</td><td style="text-align:center;"><button onclick="deleteSpending('${s.id}')" style="color:red; background:none; border:none; cursor:pointer;">✖</button></td></tr>`;
      }
      html += `<tr style="font-weight:bold; background:#fff9f9;"><td colspan="2" style="text-align:right; padding:8px;">Total Spending</td><td style="padding:8px;">${fmtAmt(total)}</td><td></td></tr></table>`;
    }
    document.getElementById('spendingTableContainer').innerHTML = html;
  }

  /* Common Helpers */
  function fmt(val) { return val ? String(val).split('T')[0] : '-'; }
  function fmtAmt(val) { return '$' + parseFloat(val || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

  function handleSort(sectionKey, columnKey) {
    if (sortConfig.section === sectionKey && sortConfig.key === columnKey) {
      sortConfig.direction = sortConfig.direction === 'asc' ? 'desc' : 'asc';
    } else {
      sortConfig.section = sectionKey; sortConfig.key = columnKey; sortConfig.direction = 'desc'; 
    }
    reportData[sectionKey].sort((a, b) => {
      let v1 = a[columnKey], v2 = b[columnKey];
      if (columnKey === 'invoicenumber' || columnKey === 'grandtotal') { v1 = parseFloat(v1 || 0); v2 = parseFloat(v2 || 0); }
      else { v1 = String(v1 || '').toLowerCase(); v2 = String(v2 || '').toLowerCase(); }
      if (v1 < v2) return sortConfig.direction === 'asc' ? -1 : 1;
      if (v1 > v2) return sortConfig.direction === 'asc' ? 1 : -1;
      return 0;
    });
    renderReport();
  }

  function getSortIcon(sectionKey, columnKey) {
    return (sortConfig.section === sectionKey && sortConfig.key === columnKey) ? (sortConfig.direction === 'asc' ? ' ▲' : ' ▼') : '';
  }

  function renderReport() {
    if (!reportData) return;
    const sections = [
      { key: 'new_today', title: 'New Today', cls: 'new_today', dateCol: 'wanteddate', dateLabel: 'Due Date' },
      { key: 'in_progress', title: 'In Progress', cls: 'in_progress', dateCol: 'wanteddate', dateLabel: 'Due Date', showStatus: true },
      { key: 'ready', title: 'Ready for Pickup', cls: 'ready', dateCol: 'wanteddate', dateLabel: 'Due Date' },
      { key: 'picked_up', title: 'Picked Up / Delivered Today', cls: 'picked_up', dateCol: 'pickupdate', dateLabel: 'Pickup Date' },
      { key: 'paid', title: 'Paid Today', cls: 'paid', dateCol: 'ordereddate', dateLabel: 'Order Date', hideOrdered: true, showMethod: true },
    ];

    let html = '';
    for (const s of sections) {
      const items = reportData[s.key];
      html += `<div class="section ${s.cls}"><h2>${s.title} <span class="count">(${items.length} items)</span></h2>`;
      if (items.length === 0) { html += '<p class="empty">None</p>'; } 
      else {
        html += `<table><tr>
            <th onclick="handleSort('${s.key}', 'invoicenumber')">Invoice #${getSortIcon(s.key, 'invoicenumber')}</th>
            <th onclick="handleSort('${s.key}', 'account_display')">Account${getSortIcon(s.key, 'account_display')}</th>
            <th onclick="handleSort('${s.key}', 'contact_display')">Contact${getSortIcon(s.key, 'contact_display')}</th>
            <th onclick="handleSort('${s.key}', 'job_name')">Job Description${getSortIcon(s.key, 'job_name')}</th>
            ${s.showStatus ? `<th onclick="handleSort('${s.key}', 'status')">Status${getSortIcon(s.key, 'status')}</th>` : ''}
            ${!s.hideOrdered ? `<th onclick="handleSort('${s.key}', 'ordereddate')">Ordered${getSortIcon(s.key, 'ordereddate')}</th>` : ''}
            <th onclick="handleSort('${s.key}', '${s.dateCol}')">${s.dateLabel}${getSortIcon(s.key, s.dateCol)}</th>
            ${s.showMethod ? `<th onclick="handleSort('${s.key}', 'pay_method_display')">Method${getSortIcon(s.key, 'pay_method_display')}</th>` : ''}
            <th onclick="handleSort('${s.key}', 'grandtotal')">Amount${getSortIcon(s.key, 'grandtotal')}</th>
          </tr>`;
        let sectionTotal = 0;
        for (const item of items) {
          sectionTotal += parseFloat(item.grandtotal || 0);
          let typeBadge = (s.key === 'paid' && item.transaction_type) ? `<span class="badge-type ${item.transaction_type === 'PAID' ? 'bg-paid' : (item.transaction_type === 'DEPOSIT' ? 'bg-deposit' : 'bg-mixed')}">${item.transaction_type}</span>` : '';
          html += `<tr>
            <td>${item.invoicenumber||''}<button class="btn-hide" onclick="hideInvoice('${item.invoicenumber}')">Hide</button></td>
            <td>${item.account_display||'-'}</td>
            <td>${item.contact_display||''}</td>
            <td>${typeBadge}${item.job_name||''}${item.payment_status === 'PAID' ? '<span class="badge-paid">PAID</span>' : (item.payment_status && item.payment_status.startsWith('BAL DUE') ? `<span class="badge-bal">${item.payment_status}</span>` : '')}</td>
            ${s.showStatus ? `<td>${item.status||'-'}</td>` : ''}
            ${!s.hideOrdered ? `<td>${fmt(item.ordereddate)}</td>` : ''}
            <td>${fmt(item[s.dateCol])}</td>
            ${s.showMethod ? `<td><span class="badge-method">${item.pay_method_display||'-'}</span></td>` : ''}
            <td>${fmtAmt(item.grandtotal)}</td>
          </tr>`;
        }
        html += `<tr style="font-weight:bold; background:#f9f9f9;"><td colspan="${(s.showStatus?1:0)+(!s.hideOrdered?1:0)+(s.showMethod?1:0)+5}" style="text-align:right; padding:8px;">Total</td><td style="padding:8px;">${fmtAmt(sectionTotal)}</td></tr></table>`;
      }
      html += '</div>';
    }
    document.getElementById('report').innerHTML = html;
  }

  let emailConfirmTimeout = null;
  let isEmailConfirming = false;

  async function sendEmail() {
    const btn = document.querySelector('.btn-email');
    
    if (!isEmailConfirming) {
      // Step 1: Ask for confirmation inline
      isEmailConfirming = true;
      btn.dataset.originalText = btn.innerText;
      btn.dataset.originalBg = btn.style.background || '';
      
      btn.innerText = 'Click again to confirm';
      btn.style.background = '#f0ad4e'; // Warning orange
      
      // Cancel confirmation after 3 seconds if not clicked again
      emailConfirmTimeout = setTimeout(() => {
        isEmailConfirming = false;
        btn.innerText = btn.dataset.originalText;
        btn.style.background = btn.dataset.originalBg;
      }, 3000);
      return;
    }

    // Step 2: Actually send
    clearTimeout(emailConfirmTimeout);
    isEmailConfirming = false;
    
    const originalText = btn.dataset.originalText;
    const originalBg = btn.dataset.originalBg;

    btn.innerText = 'Sending...';
    btn.style.background = '#6c757d'; // Gray
    btn.disabled = true;

    try {
      const res = await fetch('/api/report/email?target_date=' + dateInput.value);
      const result = await res.json();
      
      if (result.status === 'success') {
        btn.innerText = 'Sent! ✓';
        btn.style.background = '#28a745'; // Green
      } else {
        btn.innerText = 'Failed ❌';
        btn.style.background = '#d9534f'; // Red
        console.error(result.message);
      }
    } catch(e) { 
      btn.innerText = 'Error ❌';
      btn.style.background = '#d9534f';
      console.error(e);
    } finally {
      setTimeout(() => {
        btn.innerText = originalText;
        btn.style.background = originalBg;
        btn.disabled = false;
      }, 3000);
    }
  }

  function exportExcel() { window.location.href = '/api/export?target_date=' + dateInput.value; }

  loadReport();
</script>
