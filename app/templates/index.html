<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PrintSmith Daily Report</title>
<style>
  body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
  h1 { color: #333; }
  .controls { margin-bottom: 20px; display: flex; gap: 10px; align-items: center; }
  input[type=date] { padding: 8px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; }
  button { padding: 8px 16px; font-size: 14px; border: none; border-radius: 4px; cursor: pointer; }
  .btn-load { background: #4472C4; color: white; }
  .btn-export { background: #70AD47; color: white; }
  .btn-email { background: #5BC0DE; color: white; }
  .btn-refresh-fixed { 
    position: fixed; 
    top: 20px; 
    right: 20px; 
    z-index: 1000; 
    background: #28a745; 
    color: white; 
    padding: 12px 20px;
    border-radius: 30px; 
    display: flex; 
    align-items: center; 
    gap: 8px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
    cursor: pointer;
    font-size: 16px;
    font-weight: bold;
    border: 2px solid white;
    transition: all 0.2s;
  }
  .btn-refresh-fixed:hover { background: #218838; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.4); }
  .btn-refresh-fixed:active { transform: translateY(0); }
  .btn-hide { background: #eee; color: #999; padding: 2px 6px; font-size: 11px; margin-left: 5px; border-radius: 3px; cursor: pointer; border: none; }
  .btn-hide:hover { background: #ddd; color: #333; }
  .section { background: white; border-radius: 8px; padding: 16px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  .section h2 { margin-top: 0; font-size: 16px; }
  .new_today h2 { color: #4472C4; }
  .in_progress h2 { color: #7030A0; }
  .ready h2 { color: #70AD47; }
  .picked_up h2 { color: #ED7D31; }
  .paid h2 { color: #B8860B; }
  .badge-paid { background: #28a745; color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; margin-left: 5px; }
  .badge-bal { background: #FFC000; color: #333; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; margin-left: 5px; }
  .badge-type { padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; margin-right: 5px; color: white; }
  .bg-paid { background: #28a745; }
  .bg-deposit { background: #007bff; }
  .bg-ar { background: #17a2b8; }
  .bg-mixed { background: #6f42c1; }
  .badge-method { background: #e9ecef; color: #495057; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; border: 1px solid #ced4da; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: #eee; padding: 8px; text-align: left; cursor: pointer; user-select: none; }
  th:hover { background: #ddd; }
  .sort-icon { font-size: 10px; margin-left: 4px; color: #999; }
  td { padding: 8px; border-bottom: 1px solid #eee; }
  .empty { color: #999; font-style: italic; }
  .count { font-size: 12px; color: #666; margin-left: 8px; }
</style>
</head>
<body>
<button class="btn-refresh-fixed" onclick="loadReport(true)" title="Refresh Report Data">
  <span>🔄</span> Refresh
</button>
<h1>📋 PrintSmith Daily Report</h1>
<div class="controls">
  <input type="date" id="dateInput">
  <button class="btn-load" onclick="loadReport()">Load Report</button>
  <button class="btn-export" onclick="exportExcel()">Export Excel</button>
  <button class="btn-email" onclick="sendEmail()">Email to Boss</button>
  <span id="updateStatus" style="font-size: 12px; color: #666; margin-left: 10px;"></span>
</div>
<div id="report"></div>
<div id="hiddenSection" class="section" style="margin-top: 50px; border-top: 2px solid #eee;">
  <h2>🙈 Managed Hidden List</h2>
  <div id="hiddenList" style="display: flex; gap: 10px; flex-wrap: wrap;"></div>
</div>
<script>
  let reportData = null;
  let sortConfig = { key: 'invoicenumber', direction: 'desc', section: null };
  let autoRefreshTimer = null;

  const today = new Date().toISOString().split('T')[0];
  const dateInput = document.getElementById('dateInput');
  dateInput.value = today;
  dateInput.max = today; // Restrict future dates

  async function loadReport(isAuto = false) {
    const d = document.getElementById('dateInput').value;
    if (!isAuto) {
        document.getElementById('report').innerHTML = '<p>Loading...</p>';
    }
    
    try {
      const res = await fetch('/api/report?target_date=' + d);
      reportData = await res.json();
      renderReport();
      loadHiddenList(); 
      
      const now = new Date().toLocaleTimeString();
      document.getElementById('updateStatus').innerText = `Last Updated: ${now} (Auto-refresh every 60s)`;
    } catch(e) {
      if (!isAuto) {
        document.getElementById('report').innerHTML = '<p style="color:red">Error: ' + e.message + '</p>';
      }
      console.error('Auto-refresh error:', e);
    }
    
    if (autoRefreshTimer) clearInterval(autoRefreshTimer);
    autoRefreshTimer = setInterval(() => loadReport(true), 60000);
  }

  async function hideInvoice(invNum) {
    if (!confirm(`Are you sure you want to permanently hide Invoice #${invNum} from the report?`)) return;
    try {
      await fetch(`/api/hide/${invNum}`, { method: 'POST' });
      loadReport();
    } catch(e) { alert('Failed: ' + e.message); }
  }

  async function loadHiddenList() {
    try {
      const res = await fetch('/api/hidden');
      const list = await res.json();
      let html = '';
      if (list.length === 0) html = '<p class="empty">No hidden items</p>';
      for (const inv of list) {
        html += `<span style="background:#f0f0f0; padding:4px 8px; border-radius:4px; font-size:12px; border:1px solid #ccc;">
          #${inv} <button onclick="unhideInvoice('${inv}')" style="padding:0; background:none; border:none; color:red; cursor:pointer; font-weight:bold; margin-left:5px;">[Unhide]</button>
        </span>`;
      }
      document.getElementById('hiddenList').innerHTML = html;
    } catch(e) { console.error(e); }
  }

  async function unhideInvoice(invNum) {
    try {
      await fetch(`/api/unhide/${invNum}`, { method: 'POST' });
      loadReport();
    } catch(e) { alert('Failed: ' + e.message); }
  }

  function fmt(val) {
    if (!val) return '-';
    return String(val).split('T')[0];
  }

  function handleSort(sectionKey, columnKey) {
    if (sortConfig.section === sectionKey && sortConfig.key === columnKey) {
      sortConfig.direction = sortConfig.direction === 'asc' ? 'desc' : 'asc';
    } else {
      sortConfig.section = sectionKey;
      sortConfig.key = columnKey;
      sortConfig.direction = 'desc'; 
    }

    reportData[sectionKey].sort((a, b) => {
      let v1 = a[columnKey];
      let v2 = b[columnKey];
      
      if (columnKey === 'invoicenumber' || columnKey === 'grandtotal') {
        v1 = parseFloat(v1 || 0);
        v2 = parseFloat(v2 || 0);
      } else {
        v1 = String(v1 || '').toLowerCase();
        v2 = String(v2 || '').toLowerCase();
      }

      if (v1 < v2) return sortConfig.direction === 'asc' ? -1 : 1;
      if (v1 > v2) return sortConfig.direction === 'asc' ? 1 : -1;
      return 0;
    });

    renderReport();
  }

  function getSortIcon(sectionKey, columnKey) {
    if (sortConfig.section === sectionKey && sortConfig.key === columnKey) {
      return sortConfig.direction === 'asc' ? ' ▲' : ' ▼';
    }
    return '';
  }

  function fmtAmt(val) {
    const amt = parseFloat(val || 0);
    return '$' + amt.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function renderReport() {
    if (!reportData) return;
    const data = reportData;
    const sections = [
      { key: 'new_today', title: 'New Today', cls: 'new_today', dateCol: 'wanteddate', dateLabel: 'Due Date' },
      { key: 'in_progress', title: 'In Progress', cls: 'in_progress', dateCol: 'wanteddate', dateLabel: 'Due Date', showStatus: true },
      { key: 'ready', title: 'Ready for Pickup', cls: 'ready', dateCol: 'wanteddate', dateLabel: 'Due Date' },
      { key: 'picked_up', title: 'Picked Up / Delivered Today', cls: 'picked_up', dateCol: 'pickupdate', dateLabel: 'Pickup Date' },
      { key: 'paid', title: 'Paid Today', cls: 'paid', dateCol: 'ordereddate', dateLabel: 'Order Date', hideOrdered: true, showMethod: true },
    ];

    let html = '';
    for (const s of sections) {
      const items = data[s.key];
      html += `<div class="section ${s.cls}">`;
      html += `<h2>${s.title} <span class="count">(${items.length} items)</span></h2>`;
      if (items.length === 0) {
        html += '<p class="empty">None</p>';
      } else {
        html += `<table>
          <tr>
            <th onclick="handleSort('${s.key}', 'invoicenumber')">Invoice #${getSortIcon(s.key, 'invoicenumber')}</th>
            <th onclick="handleSort('${s.key}', 'account_display')">Account${getSortIcon(s.key, 'account_display')}</th>
            <th onclick="handleSort('${s.key}', 'contact_display')">Contact${getSortIcon(s.key, 'contact_display')}</th>
            <th onclick="handleSort('${s.key}', 'job_name')">Job Description${getSortIcon(s.key, 'job_name')}</th>
            ${s.showStatus ? `<th onclick="handleSort('${s.key}', 'status')">Status${getSortIcon(s.key, 'status')}</th>` : ''}
            ${!s.hideOrdered ? `<th onclick="handleSort('${s.key}', 'ordereddate')">Ordered${getSortIcon(s.key, 'ordereddate')}</th>` : ''}
            <th onclick="handleSort('${s.key}', '${s.dateCol}')">${s.dateLabel}${getSortIcon(s.key, s.dateCol)}</th>
            ${s.showMethod ? `<th onclick="handleSort('${s.key}', 'pay_method_display')">Method${getSortIcon(s.key, 'pay_method_display')}</th>` : ''}
            <th onclick="handleSort('${s.key}', 'grandtotal')">Amount${getSortIcon(s.key, 'grandtotal')}</th>
          </tr>`;
        let sectionTotal = 0;
        for (const item of items) {
          const amt = parseFloat(item.grandtotal || 0);
          sectionTotal += amt;
          
          let typeBadge = '';
          if (s.key === 'paid' && item.transaction_type) {
            let bgClass = 'bg-mixed';
            if (item.transaction_type === 'PAID') bgClass = 'bg-paid';
            else if (item.transaction_type === 'DEPOSIT') bgClass = 'bg-deposit';
            else if (item.transaction_type === 'AR PAYMENT') bgClass = 'bg-ar';
            
            typeBadge = `<span class="badge-type ${bgClass}">${item.transaction_type}</span>`;
          }

          html += `<tr>
            <td>
              ${item.invoicenumber||''}
              <button class="btn-hide" onclick="hideInvoice('${item.invoicenumber}')" title="Hide from report">Hide</button>
            </td>
            <td>${item.account_display||'-'}</td>
            <td>${item.contact_display||''}</td>
            <td>
              ${typeBadge}
              ${item.job_name||''}
              ${item.payment_status === 'PAID' ? '<span class="badge-paid">PAID</span>' : ''}
              ${(item.payment_status && item.payment_status.startsWith('BAL DUE')) ? `<span class="badge-bal">${item.payment_status}</span>` : ''}
            </td>
            ${s.showStatus ? `<td>${item.status||'-'}</td>` : ''}
            ${!s.hideOrdered ? `<td>${fmt(item.ordereddate)}</td>` : ''}
            <td>${fmt(item[s.dateCol])}</td>
            ${s.showMethod ? `<td><span class="badge-method">${item.pay_method_display||'-'}</span></td>` : ''}
            <td>${fmtAmt(item.grandtotal)}</td>
          </tr>`;
        }
        html += `<tr style="font-weight:bold; background:#f9f9f9;">
          <td colspan="${(s.showStatus ? 1 : 0) + (!s.hideOrdered ? 1 : 0) + (s.showMethod ? 1 : 0) + 5}" style="text-align:right; padding:8px;">Total</td>
          <td style="padding:8px;">${fmtAmt(sectionTotal)}</td>
        </tr>`;
        html += '</table>';
      }
      html += '</div>';
    }
    document.getElementById('report').innerHTML = html;
  }

  async function sendEmail() {
    const d = document.getElementById('dateInput').value;
    if (!confirm('Do you want to send the report email to the boss?')) return;
    
    try {
      const res = await fetch('/api/report/email?target_date=' + d);
      const result = await res.json();
      if (result.status === 'success') {
        alert('Email sent successfully!');
      } else {
        alert('Error: ' + result.message);
      }
    } catch(e) {
      alert('Send failed: ' + e.message);
    }
  }

  function exportExcel() {
    const d = document.getElementById('dateInput').value;
    window.location.href = '/api/export?target_date=' + d;
  }

  loadReport();
</script>
</body>
</html>
